version: '3.8'

services:
  # Existing Perplexica services remain here...

  # ADD THIS TOR PROXY SERVICE:
  tor-proxy:
    image: dperson/torproxy:latest
    container_name: perplexica-tor-proxy
    ports:
      - "8118:8118" # Privoxy HTTP proxy port
    restart: always
    networks:
      - perplexica-network # Ensure it matches your compose network name

networks:
  perplexica-network:
    driver: bridge
