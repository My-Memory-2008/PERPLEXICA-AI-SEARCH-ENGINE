use_default_settings: true

# 1. Map the proxy network to route hidden services
proxies:
  http:
    - http://tor-proxy:8118
  https:
    - http://tor-proxy:8118

# 2. Force the Ahmia dark web engine to active status
engines:
  - name: ahmias
    engine: ahmia
    shortcut: ah
    base_url: https://ahmia.fi
    timeout: 15.0
    disabled: false
    categories: general
    weight: 2.0
    use_proxy: true # Tells SearXNG to route this engine through our Tor proxy container
